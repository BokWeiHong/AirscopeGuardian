{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/retro.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'images/trackerjacker.png' %}">
    <title>TrackerJacker</title>

    <style>
    .action {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
        gap: 0.15rem;
        text-align: left;
        margin-bottom: 10px;
    }
    .action p {
        margin: 0;
        line-height: 2;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 10px;
    }
    .action p img.icon-pixel {
        vertical-align: middle;
        width: 18px;
        height: 18px;
    }
    </style>
</head>

<body class="retro">
    {% include "components/navbar_tracker.html" %}

    <div class="window">
        <div class="window-titlebar">
            <span class="window-title">Activation Button</span>
        </div>
        <div class="window-content">
            <button class="window-btn" id="activateTracker">Activate TrackerJacker</button>
            <button class="window-btn" id="deactivateTracker">Deactivate TrackerJacker</button>
        </div>
    </div>

    <div class="window">
        <div class="window-titlebar">
            <span class="window-title">Wi-Fi Map</span>
        </div>
        <div class="window-content">
            <table class="retro-table">
                <thead>
                    <tr>
                        <th>Network (SSID/AP MAC)</th>
                        <th>AP Signal</th>
                        <th>AP Channel</th>
                        <th>AP Bytes</th>
                        <th>Connected Device MAC</th>
                        <th>Device Signal</th>
                        <th>Device Bytes</th>
                    </tr>
                </thead>
                <tbody id="wifi-table-body">
                </tbody>
            </table>
        </div>
    </div>

    {% include "components/footer.html" %}
    <script src="{% static 'js/retro.js' %}"></script>
    <script src="{% static 'js/trackerjacker.js' %}"></script>
</body>

</html>
