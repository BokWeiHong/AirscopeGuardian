{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/retro.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'images/chart_icon.ico' %}">
    <title>Dashboard</title>
</head>

<body class="retro">
    {% include "components/navbar.html" %}

    <!-- ── Stats Overview ── -->
    <div class="chart-grid">
        <div class="chart-card">
            <p class="chart-label">Total Assets</p>
            <p class="chart-value" id="stat-total">—</p>
        </div>
        <div class="chart-card">
            <p class="chart-label">Access Points</p>
            <p class="chart-value" id="stat-aps">—</p>
        </div>
        <div class="chart-card">
            <p class="chart-label">Clients</p>
            <p class="chart-value" id="stat-clients">—</p>
        </div>
        <div class="chart-card">
            <p class="chart-label">Avg Signal</p>
            <p class="chart-value" id="stat-signal">—<span>dBm</span></p>
        </div>
        <div class="chart-card">
            <p class="chart-label">Whitelisted</p>
            <p class="chart-value" id="stat-whitelisted">—</p>
        </div>
    </div>

    <!-- ── Row 1: Asset Type + Channel Usage ── -->
    <div class="chart-arrangement">
        <div class="chart-placement col-3">
            <canvas id="chartAssetType" style="height:300px;"></canvas>
        </div>
        <div class="chart-placement col-9 full-on-tablet">
            <canvas id="chartChannels" style="height:300px;"></canvas>
        </div>
    </div>

    <!-- ── Row 2: Encryption + Severity ── -->
    <div class="chart-arrangement">
        <div class="chart-placement col-3">
            <canvas id="chartEncryption" style="height:300px;"></canvas>
        </div>
        <div class="chart-placement col-3">
            <canvas id="chartSeverity" style="height:300px;"></canvas>
        </div>
        <div class="chart-placement col-6 full-on-tablet">
            <canvas id="chartVendors" style="height:300px;"></canvas>
        </div>
    </div>

    <!-- ── Recent Security Events Table ── -->
    <div class="chart-wrapper">
        <div class="table-container">
            <table class="styledTable" id="recentEventsTable">
                <thead>
                    <tr>
                        <th>MAC Address</th>
                        <th>Event Type</th>
                        <th>Severity</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- filled by JS -->
                </tbody>
            </table>
        </div>
    </div>

    {% include "components/footer.html" %}

    <script src="{% static 'js/chart.umd.min.js' %}"></script>
    <script src="{% static 'js/retro.js' %}"></script>
    <script src="{% static 'js/charts_customize.js' %}"></script>
</body>
</html>
